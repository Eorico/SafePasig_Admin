<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/adminLog.css">
    <link rel="icon" type="image/x-icon" href="./assets/pasigLogo.png">
    <title>Admin Login</title>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>SAFE PASIG ADMIN</h1>
            <p>Access restricted to authorized personnel only</p>
        </div>
        
        <div class="login-form" id="loginForm">
            <div class="error-message" id="loginError">
                Invalid credentials. Please try again.
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="admin@example.com"
                            required
                        >
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <div class="forgot-password">
                        <a href="#" onclick="showForgotPassword(event)">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">Login to Dashboard</button>
            </form>
        </div>
        
        <div class="forgot-form" id="forgotForm">
            <div class="success-message" id="successMessage">
                Password reset link has been sent to your email address.
            </div>
            
            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="resetEmail" 
                            class="form-input" 
                            placeholder="Enter your email"
                            required
                        >
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                </div>
                
                
                <div class="btn-wrapper">
                    <button type="submit" class="send-reset-btn login-btn">Send Reset Link</button>
                </div>
                
                <div class="back-link">
                    <a href="#" onclick="showLoginForm(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="./js/adminLog.js"></script>
</body>
</html>
