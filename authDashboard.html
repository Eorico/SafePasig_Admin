<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/admin.css">
    <link rel="icon" type="image/x-icon" href="./assets/pasigLogo.png">
    <title>Safe Pasig Admin Dashboard</title>
</head>
<body>

    <div id="mediaModal" class="media-modal">
        <span class="close-modal" onclick="closeMedia()">&times;</span>
        <div class="media-content" id="mediaContent"></div>
    </div>
    <!-- Hamburger Menu Button -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Toggle menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1>ADMIN</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" data-section="statistics">
                        <svg class="nav-icon" viewBox="0 0 24 24">
                            <path d="M3 3v18h18"></path>
                            <path d="M18 17V9"></path>
                            <path d="M13 17V5"></path>
                            <path d="M8 17v-3"></path>
                        </svg>
                        Report Statistics
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="admin-view">
                        <svg class="nav-icon" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        Admin View Checker
                    </a>
                </li>
            </ul>
            <div class="logout-wrapper">
                <a class="nav-link logout-btn" onclick="logout()">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h2>Dashboard Overview</h2>
                <p>Monitor and analyze your system data in real-time</p>
            </div>

            <!-- Statistics Section -->
            <div class="content-section active" id="statistics">
                <div class="section-header">
                    <h3 class="section-title">Report Statistics - Line Graph</h3>
                    <div class="toggle-group">
                        <button class="toggle-btn active" onclick="updateChart('weekly', event)">Weekly</button>
                        <button class="toggle-btn" onclick="updateChart('monthly', event)">Monthly</button>
                        <button class="toggle-btn" onclick="updateChart('yearly', event)">Yearly</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="chart3d"></canvas>
                </div>
            </div>

            <!-- Admin View Section -->
            <div class="content-section" id="admin-view">
                <div class="section-header">
                    <h3 class="section-title">Admin Data Monitor</h3>
                    <div class="toggle-group">
                        <button class="toggle-btn active" onclick="filterData('all', event)">All</button>
                        <button class="toggle-btn" onclick="filterData('true', event)">True</button>
                        <button class="toggle-btn" onclick="filterData('false', event)">Fake</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID:</th>
                                <th>Device Id:</th>
                                <th>User:</th>
                                <th>Person Status:</th>
                                <th>Report Type:</th>
                                <th>Status:</th>
                                <th>Timestamp:</th>
                                <th>Media:</th>
                                <th>Accuracy:</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body">
                            <!-- Data will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem("adminToken");
            if (!token) {
                window.location.href = "./index.html";  
            }
        });
    </script>
    <script src="./js/admin.js"></script>
    <script src="./js/drawer.js"></script>
</body>
</html>
